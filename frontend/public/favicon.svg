<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1e3a5f"/>
  <!-- Exposure bar (full height) -->
  <rect x="6" y="5" width="8" height="22" rx="1.5" fill="#475569"/>
  <!-- Recovery portion (bottom) -->
  <rect x="6" y="15" width="8" height="12" rx="1.5" fill="#60a5fa"/>
  <!-- Loss portion label line -->
  <line x1="16" y1="10" x2="20" y2="10" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- Arrow pointing down into loss -->
  <path d="M23 6 L23 18 L20 15 M23 18 L26 15" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Recovery label lines -->
  <line x1="16" y1="21" x2="20" y2="21" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- LGD text hint -->
  <text x="17" y="8" font-family="sans-serif" font-size="4" font-weight="bold" fill="white" opacity="0.9">LGD</text>
  <text x="17" y="24" font-family="sans-serif" font-size="3.5" fill="#60a5fa" opacity="0.8">REC</text>
</svg>
